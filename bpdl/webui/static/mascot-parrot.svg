<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Original mascot: pirate-parrot head profile, single-hue icon to match the
       app's existing icon language (anarchy mark, brand mark) -->
  <defs>
    <style>
      .fill { fill: #58a6ff; }
      .cut { fill: #0a0a0a; }
    </style>
  </defs>

  <!-- head -->
  <circle class="fill" cx="100" cy="112" r="54"/>

  <!-- simple bold triangular beak -->
  <path class="fill" d="M148 100 L196 118 L148 138 Z"/>

  <!-- tricorn hat: a simple flattened dome sitting on the head -->
  <path class="cut" d="M42 96
    Q100 30 158 96
    Q100 78 42 96 Z"/>

  <!-- skull-and-crossbones on the hat -->
  <circle class="fill" cx="100" cy="58" r="6"/>
  <path stroke="#58a6ff" stroke-width="3" stroke-linecap="round" d="M90 66 L110 66 M100 60 L100 74"/>

  <!-- eye -->
  <circle class="cut" cx="118" cy="106" r="9"/>
  <circle class="fill" cx="121" cy="103" r="3"/>
</svg>
